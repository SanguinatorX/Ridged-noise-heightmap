<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/p5.js"></script>
<script>function setup() { noCanvas(); }</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.webgpu.js",
    "three/webgpu": "https://unpkg.com/three@0.170.0/build/three.webgpu.js",
    "three/tsl": "https://unpkg.com/three@0.170.0/build/three.webgpu.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<header>
  <h1>Magic 3D World</h1>
  <p>Real-time procedural 3D experiment powered by ThreeJS and motivated by Luka Piscorec</p>
</header>

<div class="camera-view">

  <canvas id="canvas"></canvas>

  <!-- Overlay scan -->
  <div class="scan-line"></div>

  <!-- grille technique -->
  <div class="hud-grid"></div>

  <!-- Infos caméra -->
  <div class="camera-info">
    <span>ISO 200</span>
    <span>F2.8</span>
    <span id="fps">60FPS</span>
    <span>WB 5600K</span>
  </div>

  <!-- panneau technique -->
  <div class="tech-panel">
    <div>CAM-01</div>
    <div>BAT 92%</div>
    <div>GPU RENDER</div>
  </div>

  <div class="rec">REC ●</div>

</div>

<footer>
  Thank you for exploring this experimental 3D world
</footer>

<script type="module" src="noise.js"></script>
<script type="module" src="sketch.js"></script>

<script>
let last = performance.now()
let frames = 0

function fpsLoop(){
 frames++
 let now = performance.now()

 if(now - last > 1000){
   document.getElementById("fps").textContent = frames + " FPS"
   frames = 0
   last = now
 }

 requestAnimationFrame(fpsLoop)
}

fpsLoop()
</script>

</body>
</html>
